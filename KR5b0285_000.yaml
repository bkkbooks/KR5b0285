front:
  text: 玄圃山靈祕籙序五一
  hash: sha256:460d2bc0cea2b23bc7dd5bf4da4860bb447a34712c5df7029303fa15cba149de
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0285_HFL_000-001a, image: hfl/0322/0322-004.png}
body:
  text: 至哉是書其來逺矣自下邳先生得之泰山嵁岩石冗後傳數子得此書者或輔于國或伏于野或超于物表或幻于世俗忽祕忽流忽藏忽見或代得或偶爾或神授或師傳出沒隱顯得之者天緣也得無不行行無不應猶響答聲影遂形發乍罕異世不知其由疑非人邪張子房得之於下邳先生李廣利得於子房費長房得於壷中公王光伯得於楚王廟劉桓公得於光伯張公超得於桓公王子晋得於華山樵父諸葛孔明得於南陽先生茅山道人得於伏虎岩長盧師張晶得於張氏山林自遙得於廟神腹此書得者多不傳於人身老而書藏事成而跡遁唯張晶得之而遺子孫授之而祕真泄僞移事改質撰詐訛真妄作門戶如十家而布流于世之不聞取世之貨世所得者徒謹其執罔無所能問有得道符句呪持用驗者亦希矣獨張氏一流遞傳得踵獨髙自尚聳動天聞朝廷封張氏山為龍虎山建宫賜號敕命纍加歷世有天師之稱食䘵不絶聲馳四方不亦異乎嗚呼玄圃山天下之祖也有名四一曰玄圃二曰積石三曰崑崙四曰西山在宇之西出西江河源經天下山嶽之骨脉發天下川源之流轉為乾之變化也為坤之根也實為風雲之府藏為水火之宫室為鬼神之宅窟為精物之聚㑹其勢狀也貫于青天截于一方亂巄犀巔峻峯巨冗凌雲鎖其上湧泉溢其下綿邈杳冥莫知其盡極中有宛玄洞乃鬼神精物之所聚也有神宰曰虛陀帝君有二十四將布分分于十二州制天下禍福之響應書目所謂靈祕籙乃玄圃山神靈密奧之妙用也靈者洞括虛無總特要妙之無質法之有應即鬼也眇于恍惚應于物象本虛本無法于虛無而運於所有異哉且夫人身之神亦同矣此天地山川之神也人身氣血之神有氣血則有神光無氣血則莫其來不見其往生於有則滅於有出於無而沒於無日用動靜有眼耳鼻口舌身一身有所撓則神運於內神動則氣發氣發則形作有激於無而應於有法術之運用推之于此則朗然可見矣所以念呪書符口噓心想閉目叩齒手指足步皆有作之形感動於虛無虛無響應而有所孌作正與形有所觸而性動於內而形役於外合焉者藏書之器也從匚從金者藏物之象金者至精之物以此書諭至精之物藏於匚函之中而不泄于外故所謂世無此字乃異世之神言爾祕籙者言此書神傳一所而不行於天下故總目謂靈祕籙也古今之得是書者唯仰其有靈而驚其異應則未嘗剖識於斯邪書三卷有二十四法上卷八法可以法天地動雷霆易乾象祛隂霾壅川流合氷河烈火馭雪氣中卷八法可以戰勝陳藏兵卒暴泉源射火矢興隂雲化人馬縮地脉步江河下卷八法可以起光華隱形質變物貨附魂夢祛惡毒伏蛟螭滅妖精治强祟其旨甚簡其應甚疾得之者可以逹一身可以事一人可以安世之民上士得之則登仙越世中士得之則輔佐國家下士得之則釁幻愚俗登仙越世者下邳先生壺中公費長房張公超王子晉南陽先生長蘆師張晶林自遙之徒也輔佐國家者李廣利王光伯劉桓公諸葛孔明之徒也釁幻愚俗者茅山道人張晶遺裔之徒也朋昔為潯陽守罷歸長安不趍天朝與故人放飲老妻兒孫棄之而弗顧飲不知止醉不知所醄然放浪於自得一日嘵坐于渭水泦見一人步自水面而至異而叱喝其人登岸謹揖於余前余俯而答之揖罷就地對坐熟視之乃林也驚而問之子何術於此耶答曰遙善此久矣今見子有放浪無憂之志特為子來莫疑來日拂旦天輝臺相見言訖踏然至水面而去余雖疑是夢是晚出渭城外醉卧天輝臺以待來晨是夜夢與林大飲同遊積石山中欲反忽覺遂起坐臺曙光欲開須臾林負一大瓢而來歡迎登臺傾酒恣飲言論古今變化辴然大笑出書一卷示余囑余曰將來天下亂離恐子遭世凌毀佩我此書持此術用放蕩僻野勿滯于此拜受之語罷大飲馭雲氣凌空而去豫後一年辭家離長安招馭雲一術游天下名山三載後至此山誓石岩見林大飲圜廬就止于此余寄此山已十載朝夕見訪者皆昔曽聞名之士日與飛來翁及沖融子術作耕釣日計不足歲計有餘悠悠任其天運爾思我往昔所作今如隔世矣嗟夫人生寰中疾如過矢弗受人間之勞去其寵辱脫其羅網絶世交遊悟其真趣此大丈夫者髙蹈獨善越于世表得天地之至樂也吁世有超道登仙之學有黃帝老氏之書唯傳其至理而蔽其術用戰爭之書有吕氏六韜唯行其知實而祕其虛幻巫覡之法有賁融指宛黃之氣失其要妙而撰其圈圖後世之學者得其粗不得其精得其輻不得其輳訛舛不復其真致使希夷之道執而不運響應之法作之不靈失其玄虛而持其實有則用世之術有矩有規致當危難之時禍無所逃身不能脫悲夫今世之學道者唯違其性理不善其術用運武之至者唯善其籌䇿不善其變化所以守身而盡而臨事有失嗚呼徒學爾曷若見黃老之書而善其術用得六韜之要而通于虛幻然後可以有法無而無導而有靜勝動而柔敵剛圓通於變化之場出入于有無之域可以了一身可以完一國斯為大全矣子年九襄筋骨雖健存亡未量恐將來此書遺於巖壑得之者不知其來故考其前紀就而序之庶我後得之者見其所由爾周通元年七月十五日上商山隱人皇甫朋序目録上卷八法發籟震沛缶星決雲壅水凝河滅火馭雲中卷八法震陳伏甲出泉火箭結華隂草木化人坐馳水行下卷八法起光隱質變物附夢袪毒禁蜃斬妖符金剛札
