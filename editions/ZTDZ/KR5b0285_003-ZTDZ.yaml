front:
  text: 玄圃山靈秘籙卷下
  hash: sha256:c2df0a7b6634e46b76d7136f07da9de260d6272f182f025b87b64b544fccff65
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0285_SJB_003-100742c, image: sjb/10/100742c.png}
body:
  text: 第一起光可以幻疑彼知化伏士卒光者至精之物烜耀也其本日精實其至精而陽精假合物固矣光太陽之光晶而至陽其光岀則衆光伏沒則衆光耀有晶光有火光有神光神光者虚光也烜耀而無實虛幻之光人亦可以興起法書符一道貼泥丸閉目端坐軍中夜光沖天人不知其皆伏其異散形聚形第二隱質可以免冤害脫大危質者本也實也滯則被事所網質起則物不可害凡在危急之中害欲及身有法可隱隱法念呪三徧吹炁一口左手心中掐巨韜印即隱質眇然不見此見彼彼不見此矣念呪三徧呪曰宛羅互巨韜印第三變物可以變化萬物變者物之互化也質者異常也一精所易而萬有珠形故有化無而無化有升化沉而沉化升炁化于中而質變乎外矣有天變有物變有神變天變者風雲作動山川互易物變者鯤化鵬雉化蜃罔象化石微細之物化者未數在水者升飛于風在風者伏入于水一炁所移一象所變神變者隱顯虚幻變化無拘也可以化形爲飛鳥質爲雲炁法虛炁爲火光變土石爲寳貝化寳貝爲土石忽有忽無變之有法變法右手掐玄印掩膏盲存想念呪三徧喝一聲疾物形應變念呪三徧呪曰阿那玄聿玄印第四附夢可以通阻之信訴難達之事夢者事警神魂而見於心境心意緒樂則夢歡暢意緒憂則夢驚險一有所撓則事境見矣欲達重禁之言通千里之事有法可附附法時書符一道始膏盲作想彼處閉目仰卧存彼處則夢到彼見彼所人如自身到彼所人夢亦見矣相與語論事無不通散形聚形第五驅毒可以免一切毒害毒者山川之蟲獸也蚖蛇蝮蝎虎狼熊羆之類皆害人之物若將兵屯於無人之境荒僻之野必有毒物有物可祛祛法用黃旙一首書五丁符竪于中軍則百獸定走毒蟲消滅一切毒惡逺離千里散形五丁符聚形散形聚形散形聚形散形聚形散形聚形第六禁蜃可以禁治蜃物禁蜃者蜃乃水中之浊物也地炁肅則伏地炁融則出有風狂水湧其性暴作則潰城陷堤爲世大害禁法鏄鐵版一片方一尺厚二寸用豹血磨朱書符其上泛舟持此符念呪放於潜蜃潭淵中其鐵未消蜃不敢岀欲識潜蜃之淵水深無魚處是也念呪抛符呪曰宛玄聿磨巨由縳上元法只書伏蛇符散形念四帝呪聚形第七斬妖恠可以除邪魔正生靈妖恠者山川之精物也虒虎貍猩白蛇赤龜蜈蚣山雉之類潜伏年乆受天地山川靈炁善變化形質跡逞妖通狀幻美貌迷惑世人或變窟穴爲華屋或化形質爲美玉幻土石爲美姝被迷之者不知有人間之事意謂登仙矣忽興驚恠則野聲吟夜暴風起物盗人間器皿攝人間寳貨不與除滅則妖恠日盛與人交雜爲人間大害斬法紅絹一方二尺四寸羊血書符以竿掛起執之面四方念呪三十六徧捲作一軸於地大喝一聲以劔爲之二段應方所有諸恠悉㫁其首念呪三十六徧呪曰宛那云于㡭利摩散形聚形第八金剛札可以縛強祟斷除鬼釁金剛者斷滅妖魔之梵神也凡有强祟興福不能但能興禍無法告治但此法治之不復再作其祟者山川之間妖精鬼神釁作人世則萬端恠異驚懼人民或附於猛獸入市或附于人身其人狂作大食斗碩不止不食則旬日不飯忽發突力拔百年之木舉數鈞之物猖狂不止則其人死矣婦人被惑則嘻嘻嗤笑形恥歌號無時其祟大作則吟震荒野夜號市聚不與法治大害於世治法用三十六兩麻染赤弦索一條其祟作時念呪八徧揮索於空索去則着祟物在入身則人身縛在獸身則獸身縛在草木則草木縛愈爭愈縛乆愈緊其祟哀告不已則責問情由伏罪罰誓則以法放之不敢復作念呪八徧呪曰聿亦云變巨由縛如要解念呪三徧呪曰初于初于娑利法中呪是梵巨神言符是神之炁无形體指印是神之命想妙用印是法用緫持受法人不可非時輕行散形應書符通神畫當以指法此是帝君玄名上象玄天下鎮死聚形別集第一無礙法但就壁上或几席或地上像彼處畫爲一圖雙户右手掐印念呪五徧以印指其門即登之欲回但以左手掐此印閉目叩齒五通而回念呪五徧呪曰玄羅回聿娑利苐二行神法書符一樣二道繫兩膝下念呪八徧舉歩快似風雲欲止即解印印同前念呪八徧呪曰于侖蘇盧摩由利散形聚形娑縳印第三缺第四缺第五缺第六盆取魚甆盆一念呪九徧隨畫魚一頭丸之縳於線頭放于盆中呼一聲予龍由挈之即有十挈十有念呪九徧呪曰娑縳侖羯侖子第七煑水石酒磨朱砂一合湧泉一𦈢以筆染朱砂念二十四將隱語書二十四符就水面書之烈火一鑪取向太陽巖石一塊火内煆令通赤剌𦈢内二十四徧如此了以淨紙包之凡水中有害人物無術可治以此石用索縳投於害物處潭洞中熱如沸湯應是害人之物一時焦爛第八缺第九佯死凡人之死者是元炁盡也炁盡則四肢百脉俱冷凡在想炁至偃月腎炁歸藏其中則百脉四肢一時俱冷皮膚如土色九竅都閉惟通耳竅事脫緩以手掩膏盲則復活念閉息呪呪曰滅羅亡玄訶奄第十飛空住法念呪九徧吹炁一口以物撒之即住如欲遠念逍遥呪三徧一撒千里念住空呪九徧呪曰虚盧虛羅止易念逍遥呪三徧呪曰摩于矢聿第十一紙鶴飛念羽化呪七徧吹炁三口以紙鶴散之翔空而飛羽化呪曰唵勑羽翔飛化神天朱湖使者凖勑速攝來吾道前不得違令如違凖太上律令勑念呪七徧呪曰娑唎𠿞嘍嗶唎叱梵呪念呪七徧呪曰薩摩訶第十二鐵眞身法丹蛇含石一塊酒一缶石液泉磨朱一合書二十四符念二十四將隱語毎一道染筆一次書罷烈火煆蛇含石令紅酒内淬不拘徧數酒盡爲度碾石爲末用石液泉滴爲元每八元清晨用湧泉一盃念二十四將隱語面北方服之若臨危時念呪三徧吸炁一口其身自堅符書酒中臨時念呪三徧呪曰摩聿巨完巨利易第十三入壷書幻化符一道投其中念呪五徧發身勢一跳入壷中念呪五徧呪曰玄于玄于由利幻化符印式上中下三印任意持用印三顆濶二寸四分厚一寸二分雷破槐木栢木尤妙玄璽印五顆風官叩炁官印水官印火官印雷官印已上五印毎顆濶二寸厚一寸並用雷破槐木凡作法先以湧泉磨朱砂黄紙印所主法官印金錢一束連印刻作用法所焚之如行卒法免用紙叩齒五通召二十四將總符用此符召一人若事緊可召二人築壇式淨室中以黄土築壇三級下濶七尺中濶五尺上濶三尺三級總髙三赤以尺土像形制捻山隴勢狀應洞府空室處所用湧泉磨朱砂依圖各書其號中宛玄洞帝君圜濶二寸四分深三寸六分以元命籙符號竪立其中依法加持後書宛黄由蜦大將符一道貼列將都室不許人入二十四將分布十二州呪語正音欽單禪炫院嶲隼爂標沇運𧮲惠易亦匕化㡭絕奕既原昜陽玄圃山圖玄圃山靈秘籙卷下
