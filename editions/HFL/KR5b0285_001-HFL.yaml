front:
  text: 玄圃山靈秘籙卷上
  hash: sha256:6353b31002b76e2d99a4c61b25d9d0c4c2659e38afabdc8df22e38aa1ea7e3f9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0285_HFL_001-001a, image: hfl/0322/0322-018.png}
body:
  text: 主法梵僊大道通玄至妙感眞虛陀大帝君穿紅絹法服緑絹裳雲芝冠碧圭朱履身肥而長面貌赤而間玉色間白鬚略鬢鬍直壇將吏彤應通清虛正應元帥穿青袍皂罩𥘎𥘎上五色彩畫黄抹額紅靴面黑微瘦手執金槌朶直壇大將夏元帥諱國則穿紅袍金甲在内黄巾金帶緑裙皂靴面大而白色有鬚略鬍手執鐡棒二十四将本無姓名以二十四炁結成而有之周師明歸興郷關元白楊德裕劉成于特彤應通于天眞蒯道明張潜眞丘與聖郎宿班公望周應姬彭眞祐馬午羊超房興興髙興盧興道查國明星子竒陶眞點杭應桃年直金聚形書時面西北念呪羅侖尼由三徧月直木聚形書符時面東方念呪詵羅詵羅子三徧日直水聚形書符時面北方念呪鬱單于羅度路三徧時直火聚形書符時面南方念呪圖龍圖龍赫易五徧胎直土聚形書符時背北面南書伏念呪宛玄虚陀元赤幸七徧書畢鋪籙在地覆面在籙伏地一刻捲籙隨身起書此籙時擇金年木月水日火時俱要值吉祥星宿築壇書籙時前三日制表一通奏帝君具狀請二十四將次第具位書隱語黄紙湧泉磨生硃書是日於空地一所嚴淨㴆洒黄土築壇三級設淨器二十四口壇中心安一爵焚香恭請玄圃山宛玄洞梵仙大道通玄至妙感眞虚陀大帝君次召請二十四將畢再拜酌酒良久有暴風起秉去酒器正心存想披髮仗劔瞑目作勢登壇書籙鋪黃絹一方濶三尺六寸取四方湧泉磨硃砂面四方念呪語書籙先書二十四將符繞四方書每方六将自西方宛字將起回環次第一一書畢方可書中間自金字起至土字止撲面在籙伏地一刻捲籙起身念呪九徧宛玄鬱于侖九岡焚延匀利禪羽云黄下壇應在壇法物器具並皆预備待時作用二十四將符第一主秋屬兖州聚形呪曰宛羅由蜦第二處暑屬兖州聚形呪曰巨完阜炎第三白露屬豫州聚形呪曰句它龍尼第四秋分屬豫州聚形呪曰蜿蜒巨离第五寒露屬幽州聚形呪曰震陀云子第六霜降屬幽州聚形呪曰神羅火丘第七立冬屬揚州聚形呪曰演龍鬰聿第八小雪屬楊州聚形呪曰聿侖允川第九大雪屬青州聚形呪曰户原巨光第十冬至屬青州聚形呪曰宇氣赫晶第十一小寒屬并州聚形呪曰火羽女岡第十二大寒屬并州聚形呪曰師龍鬱單第十三立春屬徐州聚形呪曰炫律勾靈第十四雨水屬徐州聚形呪曰原蜦震山第十五驚蟄屬冀州聚形呪曰氣煴天回第十六大署屬冀州聚形呪曰陽于巨炎第十七春分屬梁州聚形呪曰昆幽申羯第十八清明屬梁州聚形呪曰巂女崙第十九榖兩屬雍州聚形呪曰兜廬旋雲第二十立夏屬雍州聚形呪曰阿互車陀第二十一小滿屬營州聚形呪曰岳于充詵第二十二芒種屬營州聚形呪曰育烈夆易第二十三夏至聚形呪曰洪爲巨丁第二十四小暑屬聚形呪曰乇虛于侖符使符一道直符使者蕭德戴黄巾穿天符服黑靴面黑大眼有鬚執骨朶聚形凡書符設位焚鬱金香酒一樽五果畫火龍馬一騎請九地烈風旋馳使者再拜酌酒焚馬着皂服披髮跣足讀表宣䟽畢焚畫龍車鳯車麒麟車獅子犀車各一乗火龍馬二十四騎運符使符就壇所念呪焚之別無貢獻物念呪三徧呪曰炫烈域盧熒于宛玄然後焚化畢收去壇位酒果就壇閉目存想黙坐一時須臾風聲驟響離壇第三日依法書符録畢捲作一小軸紅袱褁於淨室置壇安籙壇上每日清晨焚鬱金香作法坤文坤炁念呪十五徧呪曰崑崙宛玄巨梵盧宇鬱宇靈炫陀摩路次叩齒七如此淨身齋戒三十六日夜夢金光滿室法靈驗也行之即應酒果車馬祭設乃依張晶所製齋戒行持食物所忌禽忌梟鴈鳧鳶獸忌熊犬狐兎水忌𪓣鼉鯉獭地忌葱韭已上所忌食則觸犯七戒勿起私滛勿私人物無故殺害妄發語言貴己賤人欲取無厭恃法欺世此七戒者謹持三十六日莫近婦人莫招觸物莫談穢語鑄劍法梁州鐵九斤取赤土作鑪黄土作韜範猛火鎔鐵作汁面南方上佐天關念二十四將眞言書符二十四道朱砂酒團作一丸開鑪投鐵汁内舉鑪鑄範良乆削去泥範一大缶盛湧泉以劍投缶中水響作雷聲其云鳴吟爲妙劍長三尺二寸把長八寸連把鑄湧泉取所居西方者刋印用雷破木木内藏蛇𧏍精此物有靈通性害龍雷霆爲滅其精物故碎其木其木至靈上元法印只用雷破栢木上卷八法第一發籟可以驅酷熱𨍭烈火快舳艫壯兵勢籟者天地之虚炁名曰風擊之有勢視之無質忽動忽止隨炁變作有飄風有烈風有温風有涼風起于八方變于一動發籟之法跣足披髮仗劍左手掐印西方所叩齒行持暝目作勢暴風即時驟起作西則西起一時方止叩齒九通念呪八徧舉劔頭指方所揮符一道印指一指暝目作勢發笑一聲暴風隨願即至念呪八徧呪曰爨于烈于燠陀詵宇掐天罡印散形聚形第二震霈可以濟亢旱止烈火解戰爭震者動也岀雷霆也蒸鬱隂陽騰起蜦勢八風五炁翕然而作震于穹霳而雨霈然矣震法以劍掘地三尺深淵發猛火焼通紅對火穴披髮伏劎念呪十五徧呪曰炫鬱陶鬱辰聿磨散形各五雷朱書符聚形散形聚形散形聚形散形聚形散形聚形已上五符書投酒中傾火穴傾符酒呪曰奔盧奔盧陀禹念三徧第三𦈢星可以昧彼顯蔽己迹遺日光星者天之象也地之紀也始于太極運於無盡有聖人星有臣宰星有将軍星有福星有敗星而紀于玄天而主乎人物聖人之星朗而明宰臣之星光而大將軍之星紅而耀福吉之星湛而白貧賤之星昧而細隨人之才所應人之出没善觀者必知聖人之吉凶宰臣之顯晦將軍之遷止福凶之盛衰欲昧之觀祥以法覆之其法用新𦈢朱書符貼正底着緋服披髮伏劎佐天關念呪一徧吸炁一口吹𦈢中九徧發勢倒覆于地其星䝉昧矣欲朗星遁跡但勿書圜口星瑩然自明念呪九徧炁亦九口呪曰宛玄巨晶摩盧摩盧散形聚形第四决雲可以免水害岀程旅得天時雲者天地隂陽之炁藏于山川而騰于穹窿忽衆忽散質無所定雲騰則雨滃鬱不散則雨久雨久則百川溢注濟潤之功反爲害矣決法念呪七徧以劔就地畫符一道畫畢發憤揮劔烈破地符回勢仰天一揮喝一聲疾即時景風怒起雲霾離散凡久雨蠻雲不散只作此法念呪七徧呪曰于離巨䭾散形聚形已上以劔自華蓋至五雷喝一聲疾第五壅水可以脫滞塗度群伍太極始判清炁爲天濁炁爲地混融之炁化爲水曰三才三才旣備萬物生焉水爲體也運乎上下雲是其神月是其精出於山而會於海泄于尾閭聚于隂宫四時有作止朝暮有升降渾湛應于春秋潮汐律其晦朔泉源溢于西南江河絡于天下有水神有蜦物凡將兆數之衆千乗之舟欲渡疾流有法可壅其法就舟中披髮伏劔酒一樽面東方念呪二十四徧吸炁二十四口吹酒中畢吸酒一口復吐出樽中髙呼一聲禹陀泫傾酒水中水面響如風雨水壅矣波濤泛湧江流逆轉速渡舟楫世謂之借潮念呪二十徧呪曰沇羅沇羅陶湧盧第六凝河可以解苦炎渡人馬脱大厄凝者水之結實也陽滅而隂盛天地之間八風五炁凜然變作水固凝也其炁曰隂風藏于地宫天陽衰微則其風自出岀則水凝氷也天時之凝凝於五隂六隂一陽之至寒之時春夏秋欲凝但以發嚴隂風𠟭凝合於時刻凝法斬箇羊取其血一𦈢書符一道投血中掘地三尺念呪九徧傾血地中復以上蓋之仗劔指水念溟泠冽丁疾水面寒風驟起須臾凝結矣念呪九徧呪曰冽凝都路于巽散形朱書符聚形第七滅火可以救火難火者天地之陽炁所變化也一精于大陽藏性於草木色赤盛于南方在上天爲陽在地爲和物相鎻擊則出岀則灰其物世以草木種種爲炊食養生之利一有發作則灰飛室廬煽熛山林反爲世害滅法凡烈火大發方所不以逺近但望方所呪九徧酒一口噀之則火處雨崩空驟下火滅息矣念呪九徧呪曰娑雩娑雩竭陀娑雩苐八馭雲可以激雲度髙遠脱困圍忘人世登上仙雲炁乃虛飄不實之物飛于青空有會有散善潜善廣有霈雲之逆鬰風之奔豈無情邪有法可馭馭法左手掐騰龍印念呪三十六遍仰空作想足下如有人扶便舉歩歩空步不着地雲附足下莫俯視須臾間過萬仞之險度百里之野足着地時是欲到之處先用持服丹三十六丸其丹用玫瑰四銖龍起芝七根同𦈢中烈火煆三日取岀細研末湧泉元之如大復煆三日分作四服湧泉一杯清晨面西方服四日此術則應念呪三十六徧呪曰雲羅摩爲摩羽于玄騰龍印呪數畢身登到所此芝生天下山原有龍石巖上春有華其葉青厚有白毛日明則奉捲隂雨則青茂發勢後盛盛春採之欲持此術先服丹三十六丸其丹用玫魂玄圃山靈秘籙卷上
