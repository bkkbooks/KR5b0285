front:
  text: 玄圃山靈祕籙卷中下同卷五二
  hash: sha256:776fe91925945b0374ee7d133d0f969b6adf08df3375bf22ef162ae8d277b15c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0285_HFL_002-001a, image: hfl/0322/0322-074.png}
body:
  text: 第一震陳可以挫伐强盛不戰自勝凡止兵貴在得所所壯則兵勢强勢強則敵勝臨軍之日駐陳自得其所形勢強壯更測彼陳來止之地形勢可齊先以法震震法書符三十六道遣卒三十六人各持符一道著皂衣彼髮仗劎以朱塗面乘馬各背鼓一面夜離本陳忽奔彼處下馬以劎掘地三尺深各埋其符復以土平之面彼方嚇殺三聲擊鼓一陳如此嚇三下罷號動三聲再鳴鼓如此三作畢背鼓仗劒奔騎急回本陳此後兩軍臨合彼陳來止此地夜見火光亂起雷聲震耳眼見神物人馬號𡀱兵卒自相殘殺一夜連旦陳旅大敗矣用朱書符三十六道每一道念呪三遍吹氣一口于符上呪曰炫㷍炫雷摩玄散形聚形第二伏甲可以蔽盛作永圖彼籌盡兵革之器用之不可見其實貴在變形遁跡忽聚忽散其質若雲其齊若變化大小縱橫勝敗迎者必失追者莫及此妙乃善用兵之道也凡將以兆數之甲露萬許之實有法可伏伏法書符貼甲兵之胄呪酒潑馬有百萬之兵藏于十所十萬之兵藏于十所以十為分伏于四散山谷阜野人馬無聲陳雲不起杳然不見臨敵之時嗚鼓召之一時雲集掃敵如塵土念呪二十五遍呪曰詵唬縛俱盧吹氣二十五口入酒中潑馬口散形將用朱書聚形第三出泉可以為渴塗大利泉者地之脉絡通運乎土路有通塞源有淺深南溢乎坎竅北凝于厚土春動秋靜開土必通有溫泉有冽泉有湧泉凡軍于厚土之方無川源之所但以於軍中仰天作念吸氣九口念呪九遍念畢發力吹劔鋒以剌地喝一聲疾憤勢掣劔湧泉迸出念呪九遍呪曰㳂于溢䜭利第四火箭可以無毀有弱殘強凡戰爭兵少糧薄勢不可欺於彼彼城郭豐壯糧草厚積人馬勇健與戰必敗不可與戰先以此法荒殘其盛次與之戰取勝於反掌箭法酒一盆磨朱一合以筆染書就酒面書符三十六道念呪三十六遍吹氣三十六口於酒中畢烈火一爐箭五隻以箭頭火中燒赤酒內剌淬三十六次是夜獨騎傍彼陳忽射五箭急回其箭著處火光逆起烈焰亂飛觸著草木煽熛大作斷勢亦焚竭壑不救强盛之陳即衰矣念呪三十六遍呪曰爨延于烈赫易散形衆形第五結華隂可以免困乏焦祐之患凡盛暑出師炎盛酷烈士卒有渴絶焦死之患戰敵必敗此用兵不得天時之大失也欲免此患有法興雲氣結華隂則暑氣必涼廣場火野庶可屯止隂法用小鐵壷一隻符五道以酒充實藏壷中欲結隂時以壷火炙熱呪水滴壺內十五遍溫氣奔出五雲應起須臾結華隂百里雲氣暑清涼風至念呪十五遍呪曰龍鬱盧摩玄散形呪水十五滴聚形散形聚形散形聚形散形聚形散形聚形第六草木化人可以無化有小去大代負役可使三千六百卒蕩掃百萬衆以虛無之法役其鬼神有情之物震其無情則群毒競出百怪俱現兵卒雖多莫能敵也化法臨軍之日彼髮仗劔書二十四將符隱語畢念呪吹氣五方念呪三遍三千六百卒各乘騎披髮朱塗面佩劔懸鼓一色裝勢臨陳出勇突軍一貟與彼相鬪於中軍燒符大發嚇聲齊擊金鼓隨後奔追毒蟲猛獸奔逐彼陳四野草木皆為人馬一時驟追彼陳唯聞疾雷震鳴耳火光明亂見數丈之長人如山之車騎捲後而及亂竄奔走填江塞壑軍旅大敗勢張捲止將兵急回發此一陳挫彼九分念呪三遍呪曰宛玄化巨娑由利念五方呪三遍吹一方刻木為人馬代其負載祛役之如活可使傳運重糧祛其隊伍令兵卒管押前以赤旗引後以金槌押如負物不行隊伍不齊以槌擊其腦則走步如飛其法段削四肢中通竅以繩貫穿節腠間書符呪酒潑面書二十四將符五方念呪每方三遍吹氣一口散形刻木為人馬績節符剌血書聚形呪酒呪宛于寅于聿摩九遍吹酒中氣九口赤旗符來書引水人行散形聚形第七坐馳可以起身跡脫羅網也為福地凡在危急欲逺脫身用此法念二十四將隱語步五方罡閉目存想不可開目風雨之聲止方可開目已到彼處可夜移千里步罡東西北向東左前復歸中左前東過南右前南過西右前步時念二十四將隱語始自中起復目中止面自端坐第八水行可以免水害防海島路無阻滯凡欲獨身淡水不淪河海遠近但書符步之以所書符貼兩足底左乎掐飛質印念呪九遍舉步涉水如履平地足到處波濤不作念呪九遍呪曰聿磨聿磨虛于飛質印散形聚形
